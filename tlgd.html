<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel VIP - Respostas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #ffffff;
            --text-muted: #b0b8c1;
            --accent-1: #f72585; 
            --accent-2: #7209b7; 
            --glass-bg: rgba(20, 25, 40, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .resposta-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .resposta-card:hover { transform: translateY(-5px); border-color: var(--accent-2); }

        .linha { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
        .linha:last-child { margin-bottom: 0; }
        
        .icon { color: var(--accent-1); }
        .label { font-weight: 600; color: var(--text-muted); min-width: 90px; }
        .valor { font-weight: 400; color: var(--text-main); }
        .msg-box { font-style: italic; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 10px; margin-top: 5px; }
        
        .loader { text-align: center; color: var(--text-muted); margin-top: 50px; }

        @media (max-width: 480px) { 
            body { padding: 20px 15px; } 
            .linha { flex-direction: column; gap: 2px; } 
        }
    </style>
</head>
<body>

    <h1>Suas Confirmações ✨</h1>

    <div id="container-respostas">
        <div class="loader">Buscando dados no Firebase... <br><br> <span class="material-symbols-rounded">sync</span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJ4dwA37W-plnqdI4a47e5dqlh39Hg1u8",
            authDomain: "catalogo-de-filmes-73bd2.firebaseapp.com",
            projectId: "catalogo-de-filmes-73bd2",
            storageBucket: "catalogo-de-filmes-73bd2.firebasestorage.app",
            messagingSenderId: "690101693243",
            appId: "1:690101693243:web:31197e3dc6762e7a3b651e",
            measurementId: "G-BBEB6DB7SW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const container = document.getElementById('container-respostas');

        async function carregarRespostas() {
            try {
                const q = query(collection(db, "respostas"), orderBy("data_envio", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    container.innerHTML = "<div class='loader'>Ninguém respondeu ainda. Aguarde! 🕰️</div>";
                    return;
                }

                let html = "";
                
                querySnapshot.forEach((doc) => {
                    const dados = doc.data();
                    
                    const dataEncontro = new Date(dados.data_encontro).toLocaleString('pt-BR', {
                        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });

                    const dataEnvio = new Date(dados.data_envio).toLocaleString('pt-BR');

                    html += `
                        <div class="resposta-card">
                            <div class="linha">
                                <span class="material-symbols-rounded icon">event_available</span>
                                <span class="label">Respondido em:</span>
                                <span class="valor" style="font-size: 0.9em; color: #888;">${dataEnvio}</span>
                            </div>
                            <div class="linha">
                                <span class="material-symbols-rounded icon">local_bar</span>
                                <span class="label">O que:</span>
                                <span class="valor">${dados.tipo}</span>
                            </div>
                            <div class="linha">
                                <span class="material-symbols-rounded icon">schedule</span>
                                <span class="label">Quando:</span>
                                <span class="valor">${dataEncontro}</span>
                            </div>
                            ${dados.mensagem ? `
                            <div class="linha" style="flex-direction: column;">
                                <div>
                                    <span class="material-symbols-rounded icon" style="font-size: 1.2rem; vertical-align: middle;">chat</span>
                                    <span class="label">Mensagem:</span>
                                </div>
                                <div class="valor msg-box">"${dados.mensagem}"</div>
                            </div>
                            ` : ''}
                        </div>
                    `;
                });

                container.innerHTML = html;

            } catch (error) {
                console.error("Erro ao buscar dados:", error);
                container.innerHTML = `<div class='loader' style="color: #ff4d4d;">Erro ao carregar dados. Certifique-se de que o Firestore Database foi ativado no painel do Firebase em Modo de Teste.</div>`;
            }
        }

        carregarRespostas();
    </script>
</body>
</html>
